name: fluid
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - numpy>=2.0,<3.0
  - scipy>=1.11,<2.0
  - tqdm>=4.66,<5.0
  - pyyaml>=6.0,<7.0
  - pillow>=10.0,<12.0
  - imageio>=2.31,<3.0
  - tensorboard>=2.14,<3.0
  - flake8>=6.0

  # Dev tools
  - pytest>=7.0
  - black>=23.0
  - isort>=5.12

  - pip
  - pip:
    # PyTorch (platform-specific — conda pytorch channel handles this)
    # If using conda install, pytorch is installed via channel above.
    # Otherwise uncomment:
    # - torch>=2.2,<3.0

    # Core
    - einops>=0.7,<1.0
    - omegaconf>=2.3,<3.0
    - imageio-ffmpeg>=0.4,<1.0

    # Vision
    - opencv-python-headless>=4.8,<5.0
    - kornia>=0.7,<1.0
    - timm>=0.9,<2.0

    # 3D
    - plyfile>=1.0,<2.0

    # ML tracking
    - wandb>=0.16,<1.0

    # Depth estimation
    - transformers>=4.36,<6.0
    - safetensors>=0.4,<1.0

    # Install project in editable mode
    - -e .
