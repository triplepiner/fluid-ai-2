# Debug configuration for rapid iteration on macOS (MPS / CPU).
# Inherits from default.yaml — only overrides are listed here.
# Usage: OmegaConf.merge(default_cfg, mac_debug_cfg)

data:
  resolution:
    width: 128
    height: 128

gaussian:
  num_gaussians: 5000
  densify:
    max_gaussians: 20000
  deformation:
    mlp_width: 64
    mlp_depth: 4

pinn:
  network:
    hidden_dim: 128
    num_layers: 4
  num_collocation: 1000

training:
  gaussian:
    epochs: 1000
    save_interval: 500
    eval_interval: 200
    log_interval: 50
  pinn:
    epochs: 5000
    batch_size: 1024
    save_interval: 1000
    eval_interval: 200
    log_interval: 50
  mixed_precision: false
  num_workers: 0

logging:
  use_wandb: false
